name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: outegro

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Biome (lint + format)
        run: pnpm run check
      - name: Typecheck + build
        run: pnpm turbo run typecheck build

  changes:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # A shared-package or lockfile change fans out to every app.
          filters: |
            example-api:
              - 'apps/example-api/**'
              - 'packages/**'
              - 'infra/Dockerfile.nest'
              - 'pnpm-lock.yaml'
            example-web:
              - 'apps/example-web/**'
              - 'packages/**'
              - 'infra/Dockerfile.next'
              - 'pnpm-lock.yaml'
            auth-backend:
              - 'apps/auth-backend/**'
              - 'packages/**'
              - 'infra/Dockerfile.nest'
              - 'pnpm-lock.yaml'
            landing-web:
              - 'apps/landing-web/**'
              - 'infra/Dockerfile.next'
              - 'pnpm-lock.yaml'
            auth-web:
              - 'apps/auth-web/**'
              - 'packages/**'
              - 'infra/Dockerfile.next'
              - 'pnpm-lock.yaml'

  images:
    needs: [check, changes]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.apps != '[]'
    runs-on: ubuntu-latest
    env:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
    strategy:
      max-parallel: 1 # serialize gitops pushes to avoid races
      matrix:
        app: ${{ fromJSON(needs.changes.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve Dockerfile (Next vs Nest)
        id: df
        run: |
          if [ -f "apps/${{ matrix.app }}/next.config.ts" ] || [ -f "apps/${{ matrix.app }}/next.config.js" ]; then
            echo "dockerfile=infra/Dockerfile.next" >> "$GITHUB_OUTPUT"
          else
            echo "dockerfile=infra/Dockerfile.nest" >> "$GITHUB_OUTPUT"
          fi
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.df.outputs.dockerfile }}
          build-args: |
            APP=${{ matrix.app }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.app }}:${{ steps.df.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.app }}:main
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Bump image tag in gitops
        if: ${{ env.GITOPS_TOKEN != '' }}
        env:
          APP: ${{ matrix.app }}
          TAG: ${{ steps.df.outputs.tag }}
        run: |
          git clone --depth 1 "https://x-access-token:${GITOPS_TOKEN}@github.com/outegro/gitops.git" gitops
          cd gitops
          if [ ! -f "values/${APP}.yaml" ]; then
            echo "values/${APP}.yaml not present yet (app not deployed) — skipping bump"
            exit 0
          fi
          yq -i ".image.tag = \"${TAG}\"" "values/${APP}.yaml"
          git config user.name "outegro-ci"
          git config user.email "ci@outegro.com"
          if git diff --quiet; then
            echo "no tag change"
          else
            git commit -am "ci(${APP}): image ${TAG}"
            git push
          fi
